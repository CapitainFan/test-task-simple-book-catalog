<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Catalog</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/icons/book.svg">
</head>
<body>
    <div class="app-container">
        <div id="navbar"></div>
        <div id="searchBar"></div>

        <div class="main-layout">
            <main class="catalog-column">
                <div id="catalog" class="catalog-grid"></div>
            </main>
            
            <aside class="favourites-column">
                <div class="favourites-header">
                    <div class="heart-square">
                        <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                    </div>
                    <div>
                        <h3>Favourites</h3>
                        <text><span id="favourites-count">0</span> books saved</text>
                    </div>
                </div>
                <div id="favourites-list" class="favourites-list"></div>
            </aside>
        </div>
        
        <div id="footer"></div>
    </div>
    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
