<div class="favourite-card" data-id="{{bookId}}">
    <div class="favourite-cover">
        <img src="{{coverUrl}}" alt="Обложка книги" data-title="{{title}}" data-author="{{author}}">
    </div>
    <div class="favourite-info">
        <h3 class="favourite-title">{{title}}</h3>
        <p class="favourite-book-author">{{author}}</p>
        <p class="favourite-book-year">{{year}}</p>
    </div>
    <button class="favourite-btn favourite-active">{{heartIcon}}</button>
</div>
