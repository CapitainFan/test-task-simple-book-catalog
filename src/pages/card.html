<div class="book-card" data-id="{{bookId}}">
    <div class="book-cover">
        <img src="{{coverUrl}}" alt="Обложка книги" data-title="{{title}}" data-author="{{author}}">
        <button class="favourite-btn {{favouriteClass}}">{{heartIcon}}</button>
    </div>
    <div class="book-info">
        <h3 class="book-title">{{title}}</h3>
        <p class="book-author">{{author}}</p>
        <p class="book-year">{{year}}</p>
    </div>
</div>
